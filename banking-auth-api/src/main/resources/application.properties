# ── Application ───────────────────────────────────────────────
spring.application.name=banking-auth-api
server.port=8080

# ── Database (H2 file-mode for local dev — data persists across restarts) ──
spring.datasource.url=jdbc:h2:file:./data/banking-auth-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── JWT ───────────────────────────────────────────────────────
# Secret must be >= 256 bits (32 chars) for HS256. Change in production.
app.jwt.secret=banking-auth-api-secret-key-256-bits-min-for-hmacsha256
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# ── Logging ───────────────────────────────────────────────────
logging.level.com.suraj.banking=INFO
logging.level.org.springframework.security=WARN
