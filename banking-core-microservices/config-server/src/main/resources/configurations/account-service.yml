# Configuration for account-service
# Fetched by account-service on startup via Spring Cloud Config Client (bootstrap.yml)
# All ports configurable via environment variables — see Implementation-Notes.html #1

server:
  port: ${ACCOUNT_SERVICE_PORT:8081}

spring:
  datasource:
    url: jdbc:h2:file:./data/accountdb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Prevent type headers that cause deserialization issues across service boundaries
        spring.json.add.type.headers: "false"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:${REGISTRY_PORT:8761}/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
