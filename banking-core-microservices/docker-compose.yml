# banking-core-microservices — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Prerequisites: Docker 20+ with Compose plugin, or docker-compose v1.29+
#
# Usage:
#   start-services.bat           (Windows — builds images then starts all)
#   docker-compose up -d --build (first run, builds images from source)
#   docker-compose up -d         (subsequent runs, uses cached images)
#   docker-compose down          (stop and remove containers)
#   docker-compose logs -f api-gateway
#
# Access Points (default ports — override in .env):
#   Kafdrop (Kafka UI) : http://localhost:9000
#   Eureka Dashboard   : http://localhost:8761
#   API Gateway        : http://localhost:8090
#   Account Swagger    : http://localhost:8081/swagger-ui.html
#   Transaction Swagger: http://localhost:8082/swagger-ui.html
#
# Startup order enforced by depends_on + condition: service_healthy:
#   zookeeper → kafka → [config-server] → service-registry
#   → account-service, transaction-service, notification-service → api-gateway
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

networks:
  banking-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres-data:

services:

  # ── Zookeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    networks: [ banking-net ]
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Kafka Broker ──────────────────────────────────────────────────────────────
  # Two advertised listeners:
  #   PLAINTEXT://kafka:29092      — service-to-service within banking-net
  #   PLAINTEXT_HOST://localhost:9092 — host access (tools, local tests, Kafdrop)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    networks: [ banking-net ]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Kafdrop — Kafka Web UI ────────────────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    networks: [ banking-net ]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFDROP_PORT:-9000}:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO /dev/null http://localhost:9000/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  # Services currently use H2 (dev default). Activate a 'docker' Spring profile
  # per service and set SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/banking_db
  # to switch to PostgreSQL without changing application code.
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks: [ banking-net ]
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-banking_db}
      POSTGRES_USER: ${POSTGRES_USER:-banking_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banking_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-banking_user} -d ${POSTGRES_DB:-banking_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Config Server ─────────────────────────────────────────────────────────────
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    image: banking/config-server:latest
    container_name: config-server
    networks: [ banking-net ]
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    environment:
      SERVER_PORT: "8888"
      SPRING_PROFILES_ACTIVE: native
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q UP || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Service Registry (Eureka) ─────────────────────────────────────────────────
  service-registry:
    build:
      context: .
      dockerfile: service-registry/Dockerfile
    image: banking/service-registry:latest
    container_name: service-registry
    networks: [ banking-net ]
    depends_on:
      config-server:
        condition: service_healthy
    ports:
      - "${REGISTRY_PORT:-8761}:8761"
    environment:
      SERVER_PORT: "8761"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Account Service ───────────────────────────────────────────────────────────
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    image: banking/account-service:latest
    container_name: account-service
    networks: [ banking-net ]
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${ACCOUNT_SERVICE_PORT:-8081}:8081"
    environment:
      SERVER_PORT: "8081"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      # SPRING_KAFKA_BOOTSTRAP_SERVERS overrides spring.kafka.bootstrap-servers via
      # Spring Boot relaxed binding — takes precedence over config-server value.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # EUREKA_CLIENT_SERVICEURL_DEFAULTZONE overrides eureka.client.service-url.defaultZone
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Transaction Service ───────────────────────────────────────────────────────
  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    image: banking/transaction-service:latest
    container_name: transaction-service
    networks: [ banking-net ]
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${TRANSACTION_SERVICE_PORT:-8082}:8082"
    environment:
      SERVER_PORT: "8082"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q UP || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Notification Service (WebApplicationType.NONE — pure Kafka consumer) ──────
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: banking/notification-service:latest
    container_name: notification-service
    networks: [ banking-net ]
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
    # No port mapping: no embedded HTTP server (spring-boot-starter-web is absent).
    # Health verified via Eureka registration — visible at http://localhost:8761.

  # ── API Gateway ───────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: banking/api-gateway:latest
    container_name: api-gateway
    networks: [ banking-net ]
    depends_on:
      service-registry:
        condition: service_healthy
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8090}:8090"
    environment:
      SERVER_PORT: "8090"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q UP || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
